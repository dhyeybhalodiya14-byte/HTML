<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         body {
            margin: 0;
            padding: 0;
            background-color: rgb(108, 148, 187);
            display: flex;
            min-height: 100vh;
        }
        .container {
            background-color: #000050;
            padding: 40px;
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(3,100px);
            grid-template-rows: repeat(5,100px);
            gap: 20px;
        }
        .box{
            border-radius: 18px;
                width: 100%;
                height: 100%;
                display: flex;
        }
        .box-1{ background: linear-gradient(135deg,#ccff33,#06c6ef,#efcfe3); }
        .box-2{ background: linear-gradient(135deg, #00ccff, #033c4e); }
        .box-3{ background: linear-gradient(135deg,#faa307,#da627d,#7b2cbf);}
        .box-4{ background: linear-gradient(135deg,#c9184a,#ff97b7);}
        .box-5{ background: linear-gradient(135deg,#a06cd5,#d2b7e5);}
        .box-6{ background: linear-gradient(135deg,#c9184a,#ff97b7);}
        .box-7 { background: linear-gradient(135deg, #cc00cc, #3366ff); } 
        .box-8 { background: linear-gradient(135deg, #ffcc00, #ffeebb); } 
        .box-9 { background: linear-gradient(135deg, #ff6699, #ff9966); } 
        .box-10 { background: linear-gradient(135deg, #ffff99, #66ffcc); } 
        .box-11 { background: linear-gradient(135deg, #ffeebb, #ccccff); } 
        .box-12 { background: linear-gradient(135deg, #ff3366, #ff9933); } 
        .box-13 { background: linear-gradient(135deg, #eebb99, #99ccff); } 
        .box-14 { background: linear-gradient(135deg, #cc66ff, #6600cc); } 
        .box-15 { background: linear-gradient(135deg, #00cc99, #3366cc); } 




    </style>
</head>
<body>
    <div class="container">
        <div class="box box-1"></div>
        <div class="box box-2"></div>
        <div class="box box-3"></div>

        <div class="box box-4"></div>
        <div class="box box-5"></div>
        <div class="box box-6"></div>

        <div class="box box-7"></div>
        <div class="box box-8"></div>
        <div class="box box-9"></div>

        <div class="box box-10"></div>
        <div class="box box-11"></div>
        <div class="box box-12"></div>

        <div class="box box-13"></div>
        <div class="box box-14"></div>
        <div class="box box-15"></div>
    </div>
</body>
</html>
