<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background: linear-gradient(red,orange,yellow);
            height: 200px;
            width: 200px;
            border: 3px;
            margin: 10px;
        }
        .circle{
            background: radial-gradient(red 10%,orange 40%,yellow 60%,green 100%);
            height: 200px;
            width: 300px;
            border: 3px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="circle"></div>
</body>
</html>
