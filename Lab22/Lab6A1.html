<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration — Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f2f2f2;
            padding-top: 50px;
        }
        .registration-card {
            max-width: 700px;
            margin: auto;
            border: 2px solid #000000;
            border-radius: 8px;
        }
        .card-title {
            color: #924817;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card registration-card shadow-sm">
        <div class="card-body p-4">
            <h6 class="text-uppercase mb-4 card-title">Registration Form</h6>
            <h2 class="text-center mb-4">Student Registration</h2>

            <form action="" method="get">
                
                <div class="mb-3 row">
                    <label for="name" class="col-sm-4">Full Name :</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" id="name" name="fullname" required>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="email" class="col-sm-4">Email :</label>
                    <div class="col-sm-8">
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="mobile" class="col-sm-4">Mobile :</label>
                    <div class="col-sm-8">
                        <input type="tel" class="form-control" id="mobile" name="mobile" pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="address" class="col-sm-4">Address :</label>
                    <div class="col-sm-8">
                        <textarea class="form-control" id="address" name="address" rows="2" style="resize: none;"></textarea>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="nation" class="col-sm-4">Nationality :</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" id="nation" name="nationality">
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="dob" class="col-sm-4">Date of Birth :</label>
                    <div class="col-sm-8">
                        <input type="date" class="form-control" id="dob" name="dob">
                    </div>
                </div>

                <div class="mb-3 row">
                    <label class="col-sm-4">Gender :</label>
                    <div class="col-sm-8 d-flex align-items-center">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="Male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="degree" class="col-sm-4">Highest Degree :</label>
                    <div class="col-sm-8">
                        <select class="form-select" id="degree" name="degree">
                            <option disabled selected>Select your degree</option>
                            <option>CSE</option>
                            <option>BTech</option>
                            <option>HSC</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="cpi" class="col-sm-4 col-form-label fw-bold">CPI :</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" id="cpi" name="cpi">
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="uni" class="col-sm-4 col-form-label fw-bold">University :</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" id="uni" name="university">
                    </div>
                </div>

                <div class="mb-4 row">
                    <label for="year" class="col-sm-4 col-form-label fw-bold">Passing Year :</label>
                    <div class="col-sm-8">
                        <select class="form-select" id="year" name="year">
                            <option disabled selected>Select year</option>
                            <option>2025</option>
                            <option>2024</option>
                            <option>2023</option>
                            <option>2022</option>
                            <option>2021</option>
                        </select>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success px-4 me-2 fw-bold">Submit</button>
                    <button type="reset" class="btn btn-danger px-4 fw-bold">Cancel</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
