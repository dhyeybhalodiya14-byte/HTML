<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccination Form — Bootstrap</title>

    <style>
         body {
            background-color: #f2f2f2;
            padding-top: 50px;
        }
        .registration-card {
            max-width: 700px;
            margin: auto;
            border: 2px solid #000000;
            border-radius: 8px;
        }
        .card-title {
            color: #924817;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="card registration-card shadow-sm">
            <div class="card-body p-4">
                <h5 class="text-uppercase mb-4 card-title">Registration Form</h5>
                <h2 class="text-center mb-4">COVID-19 Vaccine Registration Form</h2>

                <form action="" method="get">

                    <div class="mb-3 row">
                        <label for="First Name" class="col-sm-4">FirstName :</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" id="name" name="fullname" required>
                        </div>
                    </div><br><br>

                    <div class="mb-3 row">
                        <label for="Last Name" class="col-sm-4">Last Name :</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" id="name" name="fullname" required>
                        </div>
                    </div><br><br>

                    <div class="mb-3 row">
                        <label for="AadharNo" class="col-sm-4">Aadhar No :</label>
                        <div class="col-sm-8">
                            <input type="tel" class="form-control" id="AadharNo" name="AadharNo" pattern="[0-9]{12}"
                                maxlength="12" required>
                        </div>
                    </div><br><br>

                    
                    <div class="mb-3 row">
                        <label for="degree" class="col-sm-4">Vaccination Name :</label>
                        <div class="col-sm-8">
                            <select class="form-select" id="degree" name="degree">
                                <option disabled selected>Select your degree</option>
                                <option>Covishield</option>
                                <option>Covaxin</option>
                                <option>Sputnik V</option>
                            </select>
                        </div>
                    </div><br><br>
                    
                    <div class="mb-4 row">
                        <label for="year" class="col-sm-4 col-form-label fw-bold">Vaccination center name :</label>
                        <div class="col-sm-8">
                            <select class="form-select" id="year" name="year">
                                <option disabled selected>Select year</option>
                                
                                <option>Please Select Vaccination Center Name</option>
                                <option>City Hospital</option>
                                <option>Community Health Center</option>
                                <option>Government Hospital</option>
                            </select>
                        </div>
                    </div><br><br>
                    
                    <div class="mb-3 row">
                        <label for="dob" class="col-sm-4">Date of Dose :</label>
                        <div class="col-sm-8">
                            <input type="date" class="form-control" id="dob" name="dob">
                        </div>
                    </div><br><br>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success px-4 me-2 fw-bold">Submit</button>
                        <button type="reset" class="btn btn-danger px-4 fw-bold">Cancel</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
