<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhyey Bhalodiya - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* custom styles for backgrounds and specific colors */
        .hero-section {
            background: url('./im/brack ground0.jpg') center/cover no-repeat;
            min-height: 100vh;
            padding: 20px;
        }

        .inner-card {
            background: #fff; /* Replaced base64 image with white for clarity, add back if needed */
            border-radius: 10px;
            padding: 20px;
            min-height: 50vh;
        }

        .logo-placeholder {
            width: 100px;
            height: 50px;
            background: url('./im/images.png') center/contain no-repeat;
        }

        .service-icon-circle {
            width: 50px;
            height: 50px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }

        .card-custom { border-radius: 30px; color: white; transition: transform 0.3s; }
        .card-custom:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container-fluid inner-card shadow">
        <header class="d-flex flex-wrap align-items-center justify-content-between mb-5">
            <div class="logo-placeholder"></div>

                <li><a href="#" class="nav-link px-2 text-dark">my intro</a></li>

                <li><a href="#" class="nav-link px-2 text-dark">pages</a></li>

            </ul>

            <div class="d-flex">

                </div>
            </div>
        </header>

        <div class="row align-items-center mt-5">
            <div class="col-md-6 ps-md-5">

                <h1 class="display-3 fw-bold">DESIGNER</h1>
                <p class="lead">I LOVE TO WORK DESIGNING</p>

            </div>
        </div>
    </div>

            </div>

            <div class="col-md-9 p-4">
                <p class="text-muted mb-4">Lorem ipsum dolor sit amet consectetur adipisicing elit. Perspiciatis quaerat consequatur totam suscipit.</p>
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="p-4 card-custom bg-dark text-center">
                            <div class="service-icon-circle text-danger fw-bold fs-3">.</div>

                        </div>
                    </div>
                    <div class="col-md-4">

                        </div>
                    </div>
                    <div class="col-md-4">

                            <h5>Web Design</h5>
                        </div>
                    </div>
                </div>
            </div>
