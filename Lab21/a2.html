<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
        }
        .login-left {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .login-right {
            background: white;
            padding: 4rem 3rem;
        }
        .btn-subscribe {
            background-color: #007bff;
            border: none;
            border-radius: 25px;
            padding: 10px 0;
            font-weight: 600;
        }
        .form-control {
            border: none;
            border-bottom: 2px solid #eee;
            border-radius: 0;
            padding-left: 0;
            margin-bottom: 1.5rem;
        }
        .form-control:focus {
            box-shadow: none;
            border-bottom-color: #007bff;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card login-card row g-0 flex-row">
        <div class="col-md-6 login-left d-none d-md-flex">
            <p class="small mb-2">ABC COMP.</p>
            <h5 class="mb-4">Nice to see you again</h5>
            <h1 class="display-5 fw-bold mb-4">WELCOME BACK</h1>
            <p class="small opacity-75">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        </div>

        <div class="col-md-6 login-right">
            <h2 class="text-primary mb-4 fw-bold">Login Account</h2>
            <form>
                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email ID" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check small">
                        <input class="form-check-input" type="checkbox" id="keep">
                        <label class="form-check-label text-muted" for="keep">Keep me signed in</label>
                    </div>
                    <a href="#" class="small text-decoration-none">Already a member?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-subscribe text-uppercase">Subscribe</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
