<!DOCTYPE html>
<html>
<head>
    <title>Create Account (Table Layout)</title>
    <style>
        body {
            background-color: #546E7A;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .main-container {
            background-color: white;
            width: 700px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            border-collapse: collapse;
            overflow: hidden;
        }

        .header {
            background-color: #f1f1f1;
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid #ccc;
            color: #555;
        }

        table {
            width: 100%;
            padding: 20px;
            border-spacing: 15px;
            border-collapse: separate; 
        }

        td {
            vertical-align: top;
            width: 50%;
        }

        
        label {
            color: #2E8B57; 
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
            resize: none;
        }

       
        .footer {
            background-color: #f1f1f1;
            padding: 15px;
            text-align: right;
            border-top: 1px solid #ccc;
        }

        .btn {
            background-color: #3CB371;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h2>Create Account</h2>
        </div>

        <form>
            <table>
                <tr>
                    <td>
                        <label>First name *</label>
                        <input type="text" placeholder="enter your first name">
                    </td>
                    <td>
                        <label>Last name</label>
                        <input type="text" placeholder="enter your last name">
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <label>Email*</label>
                        <input type="email" placeholder="enter your email">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label>Password *</label>
                        <input type="password" placeholder="enter your password" id="password">
                    </td>
                    <td>
                        <label>Confirm Password *</label>
                        <input type="password" placeholder="enter your password again" id="password">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label>Gender:</label>
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender"> Female
                    </td>
                    <td>
                        <label>Hobbies</label>
                        <input type="checkbox"> Music
                        <input type="checkbox"> Sports
                        <input type="checkbox"> Travel
                        <input type="checkbox"> Movies
                    </td>
                </tr>

                <tr>
                    <td>
                        <label>Source of Income</label>
                        <select>
                            <option>Employed</option>
                            <option>Business</option>
                        </select>
                    </td>
                    <td>
                        <label>Income</label>
                        <input type="range" style="width: 80%;"> 
                        <span style="background: #2E8B57; color: white; padding: 2px 5px; border-radius: 4px; font-size: 12px;">20K</span>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label>Upload Profile Picture</label>
                        <input type="file" style="border: none; padding-left: 0;">
                    </td>
                    <td>
                        <label>Age</label>
                        <input type="number" value="18">
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <label placeholder="enter your Bio">Bio</label>
                        <textarea></textarea>
                    </td>
                </tr>
            </table>

            <div class="footer">
                <button class="btn">Create</button>
            </div>
        </form>
    </div>
    <script>
        function validateForm() {
            var pass1 = document.getElementById("psw").value;
            var pass2 = document.getElementById("confirm_psw").value;

            if (pass1 != pass2) {
                alert("Error: Passwords do not match!");
                return false;
            } else {
                alert("Success: Account Created!");
                return true;
            }
        }
    </script>

</body>
</html>
