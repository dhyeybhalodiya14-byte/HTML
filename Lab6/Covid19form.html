<!DOCTYPE html>
<html >
<head>
    <title>COVID-19 Vaccine Registration Form</title>
    <style>
        body {
            font-family: Times New Roman, serif;
        }
        fieldset {
            width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 2px solid #4CAF50;
        }

        legend {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
            padding: 0 10px;
        }
        input[type="submit"],
        input[type="reset"]{
            width: 120px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        input[type="submit"]{
            background-color: #4CAF50;
            color: #ffffff;
        }
        input[type="reset"]{
            background-color: #f44336;
            color: #ffffff;
        }
        h1 {
            text-align: center;
        }
        table {
            margin: auto;
            border-spacing: 15px;
        }
        td {
            font-size: 18px;
        }
        input, select {
            width: 250px;
            padding: 5px;
            font-size: 16px;
        }
        row {
            text-align: center;
        }
    </style>
</head>
<body>
<fieldset>
    <legend>COVID-19 Vaccine Registration</legend>
    <h1>COVID-19 Vaccine Registration Form</h1>
    
    <form>
        <table>
            <tr>
                <td>First Name</td>
                <td><input type="text" name="fname"></td>
            </tr>
            
            <tr>
                <td>Last Name</td>
                <td><input type="text" name="lname"></td>
            </tr>
            
            <tr>
                <td>Aadhar Number</td>
                <td><input type="text" name="aadhar"></td>
            </tr>
            
            <tr>
                <td>Vaccine Name</td>
                <td>
                    <select name="vaccine">
                        <option>Please Select Vaccine Name</option>
                        <option>Covishield</option>
                        <option>Covaxin</option>
                        <option>Sputnik V</option>
                    </select>
                </td>
            </tr>
            
            <tr>
                <td>Vaccination Center Name</td>
                <td>
                    <select name="center">
                        <option>Please Select Vaccination Center Name</option>
                        <option>City Hospital</option>
                        <option>Community Health Center</option>
                        <option>Government Hospital</option>
                    </select>
                </td>
            </tr>
            
            <tr>
                <td>Date of Dose</td>
                <td><input type="date" name="date"></td>
            </tr>
            
            <tr>
                <td>Dose Number</td>
                <td><input type="number" name="dose"></td>
            </tr>
            <tr></tr>
            <tr>
                <td colspan="2" class="btn-row">
                    <input type="submit" value="CLICK HERE" class="btn">
                    <input type="reset" value="CANCEL" class="btn">
                </td>
            </tr>
        </table>
    </form>
</fieldset>

</body>
</html>
