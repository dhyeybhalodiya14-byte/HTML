<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hover inside container</title>
  <style>
    
    .box a {
      color: blue;
      text-decoration: none;
      padding: 6px 10px;
      
      
    }

 
    .box a:hover {
      color: white;
      background-color: black;
      text-decoration: none;
    }
     input {
      padding: 8px;
      border: 2px solid gray;
      outline:none;
      transition: 0.3s;
    }

    
    input:focus {
      border-color: blue;
      background-color: #e6f0ff;
      box-shadow: 0 0 5px blue;
    }
    
    table {
      border-collapse:collapse;
      width: 60%;
    }

    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: center;
    }

    
    tr:hover {
      background-color: #2f82d0;
    }


    thead tr:hover {
      background-color: transparent;
    }
  
  </style>
</head>
<body>

  <div class="box">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <br>

  
  <a href="#">Outside Link</a>
   
  <br><br>
  <input type="text" placeholder="Enter name">
    <br><br><br>
    
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Marks</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>A</td>
        <td>98</td>
      </tr>
      <tr>
        <td>2</td>
        <td>B</td>
        <td>99</td>
      </tr>
      <tr>
        <td>3</td>
        <td>C</td>
        <td>100</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
