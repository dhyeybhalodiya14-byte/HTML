<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link {
            color: rgb(165, 36, 126);
        }
        a:visited {
            color: red;
        }
        a:hover {
            color: rgb(21, 169, 102);
        }
        a:active {
            color: rgb(15, 18, 89);
        }
        p::first-line {
            color: rgb(238, 14, 66);
            font-size: 22px;
            font-weight: bold;
           
        }
        p::first-letter{
            color: black;
            font-size: 50px;
        }
        p::selection{
            background-color: bisque;
        }
        input:focus{
            color: blue;
        }
        
    </style>
</head>

<body>
    <a href="https://www.google.com/?zx=1771831782873&no_sw_cr=1">google link</a>
    
    <hr>
    <p>

        hic, odit, accusamus dolores eum tenetur numquam! Vero aliquid harum in labore ad praesentium!
    </p>

    <input type="text" placeholder="Enter">

</html>
