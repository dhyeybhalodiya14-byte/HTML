<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 200px;
            width: 200px;
            top: 0%;
            left: 0%;
            border-radius: 50%;
            position: absolute;
            background-color: rgb(19, 196, 28);
            animation-name: animations;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-delay: 1s;
        }

        @keyframes animations {
            0% {
                background-color: rgb(84, 134, 174);
                top: 0%;
                left: 0%;
            }

            20% {
                background-color: rgb(173, 96, 8);
                top: calc(100% - 200px);
                left: 20%;
            }

            40% {
                background-color: yellow;
                top: 25%;
                left: 40%;
            }

            60% {
                background-color: rgb(119, 49, 63);
                top: calc(100% - 300px);
                left: 60%;
            }

            80% {
                background-color: rgb(45, 32, 135);
                top: 10%;
                left: 80%;
            }

            100% {
                background-color: rgb(152, 39, 77);
                top: calc(100% - 200px);
                left: calc(100% - 200px);
            }

        }
    </style>
</head>

<body>
    <section>
        <div class="box"></div>
    </section>

</body>

</html>
