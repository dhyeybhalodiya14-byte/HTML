<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Pricing Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff; padding-top: 80px; }
        
        .pricing-card {
            border: 1px solid #e0e0e0;
            background-color: #f8f9fa;
            padding: 40px 20px;
            transition: all 0.3s ease-in-out;
            position: relative;
            z-index: 1;
        }

        /* The Pop-up Logic */
        .pricing-card:hover {
            transform: translateY(-20px);
            background-color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 5;
        }

        .pricing-card h2 { font-weight: 800; }
        .price { font-size: 2rem; font-weight: 700; margin-bottom: 20px; }
        .btn-order { background-color: #ff5e85; color: white; border-radius: 0; border: none; padding: 10px 25px; }

        .card-highlight {
            background-color: #ff5e85;
            color: white;
            margin-top: -30px;
            padding: 60px 20px;
            z-index: 2;
        }
        
        .card-highlight:hover {
            background-color: #ff4773;
            transform: translateY(-40px); /* Extra lift for the highlighted card */
        }

        .btn-order-yellow { background-color: #ffff00; color: #333; border-radius: 0; border: none; padding: 10px 25px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
  <div class="container mb-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Pricing Table</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <p class="text-muted">Sample text. Lorem ipsum dolor sit amet, consectetur adipiscing elit nullam nunc justo sagittis suscipit ultrices.</p>
            </div>
        </div>
    </div>
    <div class="row g-0 align-items-center">
        <div class="col-md-3">
            <div class="pricing-card text-center">
                <h2>Start</h2>
                <div class="price">Free</div>
                <p>1 User<br>1 Project</p>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>
        <div class="col-md-3">
            <div class="pricing-card card-highlight text-center shadow">
                <h2>Basic</h2>
                <div class="price">$19.99</div>
                <p>5 Users<br>5 Projects</p>
                <button class="btn btn-order-yellow">Order Now</button>
            </div>
        </div>
        <div class="col-md-3">
            <div class="pricing-card text-center">
                <h2>Medium</h2>
                <div class="price">$49.99</div>
                <p>100 Users<br>100 Projects</p>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>
        <div class="col-md-3">
            <div class="pricing-card text-center">
                <h2>Expert</h2>
                <div class="price">$199.99</div>
                <p>Unlimited Users<br>Unlimited Projects</p>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
