<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Hover Pricing Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ss-pink: #f05470;
            --ss-light-bg: #fdfdfd;
            --transition-speed: 0.4s;
        }

        body {
            background-color: #f4f4f4;
            padding: 100px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- 1. Base Card State (White/Grey) --- */
        .pricing-card {
            background-color: var(--ss-light-bg);
            border: 1px solid #e0e0e0;
            padding: 60px 30px;
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all var(--transition-speed) cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 100%;
            cursor: pointer;
        }

        .pricing-card h2 {
            font-weight: 700;
            transition: color var(--transition-speed);
        }

        .price-text {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 15px 0;
            color: #333;
            transition: color var(--transition-speed);
        }

        .features-list {
            color: #777;
            margin-bottom: 30px;
            transition: color var(--transition-speed);
        }

        /* --- 2. Base Button State --- */
        .btn-order {
            background-color: #333; /* Dark button when inactive */
            color: white;
            border: none;
            border-radius: 0;
            padding: 12px 30px;
            font-weight: 600;
            transition: all var(--transition-speed);
        }

        /* --- 3. Hover State (Z-Axis Pop + Pink Change) --- */
        .pricing-card:hover {
            /* Z-axis movement */
            transform: translateY(-20px) scale(1.05);
            z-index: 100;
            
            /* Color Change to Pink */
            background-color: var(--ss-pink);
            border-color: var(--ss-pink);
            box-shadow: 0 30px 60px rgba(240, 84, 112, 0.35);
        }

        /* Change text colors to white when card is pink */
        .pricing-card:hover h2,
        .pricing-card:hover .price-text,
        .pricing-card:hover .features-list {
            color: #ffffff;
        }

        /* Change button to yellow when card is pink (matches your SS style) */
        .pricing-card:hover .btn-order {
            background-color: #ffff00;
            color: #333;
        }

    </style>
</head>
<body>

<div class="container">
      <div class="container mb-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Pricing Table</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <p class="text-muted">Sample text. Lorem ipsum dolor sit amet, consectetur adipiscing elit nullam nunc justo sagittis suscipit ultrices.</p>
            </div>
        </div>
    </div>
    <div class="row g-0 justify-content-center">
        
        <div class="col-lg-3 col-md-6">
            <div class="pricing-card">
                <h2>Start</h2>
                <div class="price-text">Free</div>
                <div class="features-list">
                    <p class="m-0">1 User</p>
                    <p class="m-0">1 Project</p>
                </div>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="pricing-card">
                <h2>Basic</h2>
                <div class="price-text">$19.99</div>
                <div class="features-list">
                    <p class="m-0">5 Users</p>
                    <p class="m-0">5 Projects</p>
                </div>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="pricing-card">
                <h2>Medium</h2>
                <div class="price-text">$49.99</div>
                <div class="features-list">
                    <p class="m-0">100 Users</p>
                    <p class="m-0">100 Projects</p>
                </div>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="pricing-card">
                <h2>Expert</h2>
                <div class="price-text">$199.99</div>
                <div class="features-list">
                    <p class="m-0">Unlimited Users</p>
                    <p class="m-0">Unlimited Projects</p>
                </div>
                <button class="btn btn-order">Order Now</button>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
